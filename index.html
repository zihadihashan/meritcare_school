<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ডায়াগনস্টিক সেন্টার">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#005F52">
<title>বীরামপুর সকল ডায়াগনস্টিক</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--teal:#005F52;--teal-dark:#003D35;--accent:#FF6B35;--bg:#F0F4F3;--white:#fff;--text:#1A2E2B;--muted:#607D74;--radius:16px;--shadow:0 2px 12px rgba(0,80,70,.10)}
html,body{height:100%;background:var(--bg);font-family:'Hind Siliguri','Noto Sans Bengali','Segoe UI',sans-serif;color:var(--text);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);background:var(--bg)}
.screen.active{transform:translateX(0)}
.screen.prev{transform:translateX(-40%)}
.header{background:linear-gradient(135deg,var(--teal-dark),var(--teal));padding:46px 20px 18px;position:relative;overflow:hidden;flex-shrink:0}
.header::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.header-row{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1}
.header-title{color:#fff;font-size:16px;font-weight:700}
.header-sub{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px}
.back-btn{color:#fff;font-size:22px;cursor:pointer;padding:0 4px;background:none;border:none;display:none}
.icon-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:12px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.content::-webkit-scrollbar{display:none}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:66px;background:var(--white);border-top:1px solid rgba(0,95,82,.1);display:flex;box-shadow:0 -4px 20px rgba(0,80,70,.08);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:10px;gap:3px;border:none;background:none;padding-top:2px}
.nav-item.active{color:var(--teal)}
.nav-icon{font-size:21px;line-height:1}
.nav-item.active .nav-icon{transform:scale(1.12)}
.section-title{font-size:13px;font-weight:700;color:var(--text);margin:14px 16px 0;display:flex;align-items:center;gap:6px}
.doc-card{background:var(--white);border-radius:var(--radius);margin:8px 16px 0;padding:12px;display:flex;align-items:center;gap:11px;cursor:pointer;box-shadow:var(--shadow);border:none;width:calc(100% - 32px);transition:transform .15s}
.doc-card:active{transform:scale(.98)}
.doc-avatar{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-spec{font-size:11px;color:var(--teal);margin-top:2px}
.doc-hours{font-size:10px;color:var(--muted);margin-top:2px}
.doc-fee{text-align:right;flex-shrink:0}
.fee-amt{font-size:15px;font-weight:700;color:var(--teal);display:block}
.serial-btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit}
.quick-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px 16px 0}
.qa-card{background:var(--white);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;box-shadow:var(--shadow);border:none;display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform .15s}
.qa-card:active{transform:scale(.95)}
.qa-icon{font-size:27px}
.qa-label{font-size:11px;font-weight:600;color:var(--text)}
.spec-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px;-webkit-overflow-scrolling:touch}
.spec-row::-webkit-scrollbar{display:none}
.spec-chip{background:var(--white);border:1.5px solid #ddd;border-radius:20px;padding:7px 13px;font-size:12px;white-space:nowrap;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:5px;box-shadow:0 1px 4px rgba(0,0,0,.06);font-family:inherit}
.spec-chip.active{background:var(--teal);border-color:var(--teal);color:#fff}
.search-box{margin:10px 16px 0;background:var(--white);border-radius:12px;display:flex;align-items:center;padding:10px 14px;box-shadow:var(--shadow)}
.search-box input{flex:1;border:none;outline:none;font-size:13px;background:transparent;font-family:inherit;color:var(--text)}
.profile-header{padding:10px 20px 18px;text-align:center;position:relative;z-index:1}
.profile-avatar{font-size:52px;margin-bottom:6px}
.profile-name{color:#fff;font-size:17px;font-weight:700}
.profile-spec{color:rgba(255,255,255,.8);font-size:12px}
.profile-qual{color:rgba(255,255,255,.6);font-size:11px;margin-top:2px}
.profile-exp{display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,.2);color:#fff;border-radius:20px;padding:4px 12px;font-size:11px;margin-top:7px}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px 0}
.info-box{background:var(--white);border-radius:12px;padding:11px 8px;text-align:center;box-shadow:var(--shadow)}
.info-icon{font-size:20px}
.info-label{font-size:9px;color:var(--muted);margin-top:3px}
.info-val{font-size:12px;font-weight:700;color:var(--text);margin-top:2px}
.days-row{display:flex;gap:5px;flex-wrap:wrap;padding:6px 0 0}
.day-chip{padding:5px 9px;border-radius:8px;border:1.5px solid #ddd;font-size:11px;font-weight:600;color:#90A4AE}
.day-chip.avail{color:var(--teal);border-color:var(--teal)}
.day-chip.today{background:var(--teal);color:#fff}
.section-box{background:var(--white);border-radius:var(--radius);margin:10px 16px 0;padding:13px;box-shadow:var(--shadow)}
.section-box-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.section-box-text{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:6px}
.profile-book-btn{display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;width:calc(100% - 32px);margin:12px 16px 4px;font-family:inherit;box-shadow:0 4px 16px rgba(0,95,82,.3)}
.booking-banner{padding:12px 20px 18px;display:flex;align-items:center;gap:13px;position:relative;z-index:1}
.banner-avatar{font-size:42px}
.banner-name{color:#fff;font-size:14px;font-weight:700}
.banner-spec{color:rgba(255,255,255,.75);font-size:11px}
.banner-fee{color:rgba(255,255,255,.9);font-size:11px;font-weight:600;margin-top:2px}
.date-scroll{display:flex;gap:8px;overflow-x:auto;padding:10px 16px 0;-webkit-overflow-scrolling:touch}
.date-scroll::-webkit-scrollbar{display:none}
.date-chip{min-width:54px;background:var(--white);border:1.5px solid #ddd;border-radius:12px;padding:9px 5px;text-align:center;cursor:pointer;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:all .2s}
.date-chip.active{background:var(--teal);border-color:var(--teal);color:#fff}
.date-day{font-size:10px;color:var(--muted)}
.date-num{font-size:17px;font-weight:700;color:var(--text);display:block;line-height:1.2}
.date-today{font-size:9px;color:var(--teal);font-weight:600}
.date-chip.active .date-day,.date-chip.active .date-num,.date-chip.active .date-today{color:#fff}
.serial-status{margin:8px 16px 0;padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;text-align:center}
.status-ok{background:#E8F5E9;color:#2E7D32}
.status-full{background:#FFEBEE;color:#C62828}
.form-section{margin:10px 16px 0;background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.form-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;margin-top:11px;display:block}
.form-label:first-child{margin-top:0}
.form-input{width:100%;border:1.5px solid #E0E0E0;border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text);outline:none;background:var(--bg);transition:border-color .2s}
.form-input:focus{border-color:var(--teal)}
textarea.form-input{height:70px;resize:none}
.form-row{display:flex;gap:10px}
.form-row>div{flex:1}
.summary-card{margin:10px 16px 0;background:var(--white);border-radius:var(--radius);padding:13px;box-shadow:var(--shadow)}
.sum-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #F0F4F3;font-size:13px}
.sum-row:last-child{border-bottom:none}
.sum-label{color:var(--muted)}
.sum-val{font-weight:600;color:var(--text)}
.book-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--teal);color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;width:calc(100% - 32px);margin:12px 16px;font-family:inherit;box-shadow:0 4px 16px rgba(0,95,82,.3);transition:transform .15s}
.book-btn:active{transform:scale(.97)}
.book-btn:disabled{background:#90A4AE;box-shadow:none}
.confirm-header{background:linear-gradient(135deg,#1B5E20,#2E7D32);padding:56px 20px 28px;text-align:center}
.check-circle{width:76px;height:76px;background:rgba(255,255,255,.2);border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:38px}
.confirm-title{color:#fff;font-size:21px;font-weight:700}
.confirm-sub{color:rgba(255,255,255,.8);font-size:12px;margin-top:3px}
.ticket{background:var(--white);margin:14px;border-radius:var(--radius);box-shadow:0 4px 20px rgba(0,0,0,.12);overflow:hidden}
.ticket-serial{color:#fff;text-align:center;padding:14px;display:flex;flex-direction:column;align-items:center}
.ticket-serial-label{font-size:10px;opacity:.75;letter-spacing:1px}
.ticket-serial-num{font-size:56px;font-weight:700;line-height:1.1}
.ticket-body{padding:14px}
.ticket-row{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.ticket-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.ticket-info-label{font-size:10px;color:var(--muted);font-weight:600}
.ticket-info-val{font-size:13px;font-weight:700;color:var(--text)}
.ticket-info-sub{font-size:11px;color:var(--muted)}
.ticket-divider{height:1px;background:#F0F4F3;margin:6px 0}
.ticket-fee-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.ticket-fee-val{font-size:20px;font-weight:700;color:var(--teal)}
.confirm-actions{display:flex;gap:10px;padding:0 14px 18px}
.share-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:2px solid var(--teal);background:#fff;color:var(--teal);border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.home-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--teal);color:#fff;border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.filter-tabs{display:flex;background:var(--white);padding:7px 11px;gap:6px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-shrink:0}
.filter-tab{flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:600;color:var(--muted);text-align:center;cursor:pointer;border:none;background:var(--bg);font-family:inherit;transition:all .2s}
.filter-tab.active{background:var(--teal);color:#fff}
.appt-card{background:var(--white);border-radius:14px;margin:9px 16px 0;overflow:hidden;box-shadow:var(--shadow);display:flex}
.appt-bar{width:5px;flex-shrink:0}
.appt-bar.ok{background:#2E7D32}
.appt-bar.cancelled{background:#C62828}
.appt-bar.past{background:#90A4AE}
.appt-content{flex:1;padding:11px}
.appt-header{display:flex;justify-content:space-between;margin-bottom:7px}
.appt-serial-badge{background:var(--teal);color:#fff;border-radius:8px;padding:4px 10px;text-align:center}
.appt-serial-badge span:first-child{font-size:9px;opacity:.8;display:block}
.appt-serial-num{font-size:17px;font-weight:700;line-height:1.2}
.appt-status{font-size:11px;font-weight:600;text-align:right}
.appt-date{font-size:10px;color:var(--muted);margin-top:2px}
.appt-doc-name{font-size:13px;font-weight:700}
.appt-doc-spec{font-size:11px;color:var(--teal)}
.appt-detail-row{display:flex;justify-content:space-between;margin-top:4px}
.appt-detail{font-size:10px;color:var(--muted)}
.cancel-link{display:flex;align-items:center;gap:4px;color:#C62828;font-size:11px;font-weight:600;cursor:pointer;margin-top:7px;padding-top:7px;border-top:1px solid #F0F4F3;background:none;border-left:none;border-right:none;border-bottom:none;font-family:inherit}
.pin-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px}
.pin-icon{font-size:52px;margin-bottom:10px}
.pin-title{font-size:20px;font-weight:700;margin-bottom:3px}
.pin-sub{font-size:13px;color:var(--muted);margin-bottom:26px;text-align:center}
.pin-input{width:130px;text-align:center;font-size:26px;letter-spacing:10px;border:2px solid #ddd;border-radius:12px;padding:12px;outline:none;font-family:monospace;color:var(--text);background:var(--bg)}
.pin-input:focus{border-color:var(--teal)}
.pin-btn{background:var(--teal);color:#fff;border:none;border-radius:12px;padding:13px 38px;font-size:14px;font-weight:700;cursor:pointer;margin-top:18px;font-family:inherit}
.admin-tabs{display:flex;background:var(--white);border-bottom:1px solid #eee;overflow-x:auto;flex-shrink:0}
.admin-tabs::-webkit-scrollbar{display:none}
.admin-tab{flex-shrink:0;padding:11px 14px;font-size:11px;font-weight:600;color:var(--muted);text-align:center;cursor:pointer;border-bottom:3px solid transparent;border-top:none;border-left:none;border-right:none;background:none;font-family:inherit;white-space:nowrap}
.admin-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px 0}
.stat-box{background:var(--white);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:30px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.revenue-box{background:var(--teal);border-radius:14px;margin:10px 16px 0;padding:18px;text-align:center}
.revenue-lbl{color:rgba(255,255,255,.75);font-size:12px}
.revenue-amt{color:#fff;font-size:34px;font-weight:700}
.admin-appt{background:var(--white);border-radius:12px;margin:8px 16px 0;padding:11px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.admin-serial{width:34px;height:34px;background:var(--teal);color:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.admin-appt-info{flex:1}
.admin-name{font-size:12px;font-weight:700}
.admin-detail{font-size:10px;color:var(--muted)}
.date-nav{display:flex;align-items:center;background:var(--white);margin:12px 16px 0;border-radius:12px;padding:10px 14px;box-shadow:var(--shadow)}
.date-nav-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--teal);padding:0 4px}
.date-nav-text{flex:1;font-size:13px;font-weight:700;text-align:center}
.doctor-stat-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F0F4F3}
.doctor-stat-row:last-child{border-bottom:none}
.doctor-stat-name{font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doctor-stat-bar{flex:2;height:6px;background:#F0F4F3;border-radius:3px;overflow:hidden}
.doctor-stat-fill{height:100%;border-radius:3px;transition:width .5s}
.doctor-stat-count{font-size:11px;font-weight:700;color:var(--muted);min-width:18px;text-align:right}
.add-doc-fab{display:flex;align-items:center;gap:8px;background:var(--teal);color:#fff;border:none;border-radius:12px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;margin:12px 16px 0;width:calc(100% - 32px);justify-content:center;font-family:inherit;box-shadow:0 3px 12px rgba(0,95,82,.3)}
.doc-manage-card{background:var(--white);border-radius:13px;margin:7px 16px 0;padding:11px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.doc-manage-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.edit-btn-sm{background:#E3F2FD;color:#1565C0;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.del-btn-sm{background:#FFEBEE;color:#C62828;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.4,0,.2,1);padding-bottom:24px;position:relative}
.modal-sheet::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.modal-title{font-size:16px;font-weight:700;padding:13px 20px 0;color:var(--text)}
.modal-close{position:absolute;top:12px;right:16px;font-size:22px;background:none;border:none;cursor:pointer;color:var(--muted)}
.modal-body{padding:0 18px}
.day-toggle-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.day-toggle{padding:7px 11px;border-radius:8px;border:1.5px solid #ddd;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;background:none;font-family:inherit}
.day-toggle.on{background:var(--teal);border-color:var(--teal);color:#fff}
.avatar-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.avatar-opt{font-size:26px;width:44px;height:44px;border-radius:10px;border:2px solid #ddd;cursor:pointer;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
.avatar-opt.on{border-color:var(--teal);background:#E0F7FA}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-opt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.color-opt.on{border-color:#333;transform:scale(1.15)}
.save-doc-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--teal);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:16px;font-family:inherit}
.note-box{background:#FFF8E1;border-radius:10px;margin:10px 16px 0;padding:11px 13px;display:flex;gap:8px;align-items:flex-start}
.note-text{font-size:11px;color:#E65100;flex:1}
.contact-card{background:var(--teal-dark);border-radius:14px;margin:12px 16px 0;padding:15px}
.contact-title{color:#fff;font-size:13px;font-weight:700;margin-bottom:7px}
.contact-item{color:rgba(255,255,255,.75);font-size:12px;margin-top:5px;display:flex;align-items:center;gap:8px}
.empty-state{padding:50px 20px;text-align:center}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-text{font-size:13px;color:var(--muted)}
.empty-btn{background:var(--teal);color:#fff;border:none;border-radius:12px;padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px;font-family:inherit}

function merge(a,b){var r={}; for(var k in a)r[k]=a[k]; for(var k in b)r[k]=b[k]; return r;}

// ===== DATES =====
function todayISO(){return new Date().toISOString().split('T')[0];}
function formatISO(d){var z=function(n){return String(n).padStart(2,'0');};return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
function formatDisplay(d){return DAYS_FULL[d.getDay()]+', '+d.getDate()+' '+MONTHS_BN[d.getMonth()];}
function getAvailDates(doc,count){
  count=count||8; var dates=[],today=new Date();
  for(var i=0;i<90&&dates.length<count;i++){var d=new Date(today);d.setDate(today.getDate()+i);if(doc.dayIdx.indexOf(d.getDay())>=0)dates.push(d);}
  return dates;
}

// ===== THEME =====
function applyTheme(color){
  document.documentElement.style.setProperty('--teal',color);
  var d=parseInt(color.slice(1),16);
  var r=(d>>16)&255,g=(d>>8)&255,b=d&255;
  var dark='#'+[r,g,b].map(function(x){return Math.max(0,x-40).toString(16).padStart(2,'0');}).join('');
  document.documentElement.style.setProperty('--teal-dark',dark);
  var tm=document.querySelector('meta[name="theme-color"]');if(tm)tm.content=color;
}

// ===== NAV =====
function goTo(id){
  var cur=screenStack[screenStack.length-1]; if(cur===id)return;
  document.getElementById(cur).classList.remove('active'); document.getElementById(cur).classList.add('prev');
  document.getElementById(id).classList.add('active'); screenStack.push(id);
  setTimeout(function(){var el=document.getElementById(cur);if(el)el.classList.remove('prev');},360);
}
function goBack(){
  if(screenStack.length<=1)return;
  var cur=screenStack.pop(), prev=screenStack[screenStack.length-1];
  document.getElementById(cur).classList.remove('active');
  document.getElementById(prev).classList.remove('prev'); document.getElementById(prev).classList.add('active');
}
function navTo(tab){

  renderDoctors();

    return ms&&mq;

  var cs=document.getElementById('doc-count-sub'); if(cs)cs.textContent=filtered.length+' জন ডাক্তার';

// ===== APPOINTMENTS =====
function setApptFilter(f,el){
  apptFilter=f;
  document.querySelectorAll('.filter-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active'); renderAppointments();
}
function renderAppointments(){
  var now=todayISO();
  var appts=getAppts().sort(function(a,b){return b.bookedAt.localeCompare(a.bookedAt);});
  if(apptFilter==='upcoming')appts=appts.filter(function(a){return a.date>=now&&a.status!=='cancelled';});
  else if(apptFilter==='past')appts=appts.filter(function(a){return a.date<now||a.status==='cancelled';});
  var cont=document.getElementById('appointments-content');
  if(!appts.length){cont.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">কোনো সিরিয়াল নেই</div><button class="empty-btn" onclick="navTo(\'doctors\')">এখনই সিরিয়াল নিন</button></div>';return;}
  cont.innerHTML=appts.map(function(a){
    var cancelled=a.status==='cancelled', past=a.date<now;
    var barCls=cancelled?'cancelled':past?'past':'ok';
    var statusTxt=cancelled?'❌ বাতিল':past?'✅ সম্পন্ন':'🟢 নিশ্চিত';
    return '<div class="appt-card"><div class="appt-bar '+barCls+'"></div>'
      +'<div class="appt-content">'
      +'<div class="appt-header"><div class="appt-serial-badge"><span>সিরিয়াল</span><div class="appt-serial-num">'+a.serialNumber+'</div></div>'
      +'<div><div class="appt-status">'+statusTxt+'</div><div class="appt-date">'+a.dateDisplay+'</div></div></div>'
      +'<div class="appt-doc-name">'+esc(a.doctorName)+'</div>'
      +'<div class="appt-doc-spec">'+esc(a.doctorSpec)+'</div>'
      +'<div class="appt-detail-row"><span class="appt-detail">⏰ '+esc(a.time)+'</span><span class="appt-detail">🚪 '+esc(a.room)+'</span></div>'
      +'<div class="appt-detail-row"><span class="appt-detail">👤 '+esc(a.patientName)+'</span><span class="appt-detail" style="font-weight:700;color:var(--teal)">৳'+a.fee+'</span></div>'
      +(!cancelled&&!past?'<button class="cancel-link" onclick="cancelAppt(\''+a.id+'\')">✕ সিরিয়াল বাতিল করুন</button>':'')
      +'</div></div>';
  }).join('');
}
function cancelAppt(id){
  if(!confirm('এই সিরিয়াল বাতিল করতে চান?'))return;
  saveAppts(getAppts().map(function(a){return a.id===id?merge(a,{status:'cancelled'}):a;}));
  renderAppointments(); updateBadge();
}

function toggleDay(idx,el){
  var i=fSelDays.indexOf(idx);
  if(i>=0)fSelDays.splice(i,1); else fSelDays.push(idx);
  el.classList.toggle('on',fSelDays.indexOf(idx)>=0);
}

function saveDoctor(){
  var name=document.getElementById('df-name').value.trim();
  var spec=document.getElementById('df-spec').value.trim();
  var qual=document.getElementById('df-qual').value.trim();
  var exp=document.getElementById('df-exp').value.trim();
  var fee=parseInt(document.getElementById('df-fee').value)||0;
  var limit=parseInt(document.getElementById('df-limit').value)||20;
  var room=document.getElementById('df-room').value.trim();
  var hours=document.getElementById('df-hours').value.trim();
  if(!name){alert('ডাক্তারের নাম দিন');return;}
  if(!spec){alert('বিশেষজ্ঞতা দিন');return;}
  if(!fee){alert('ভিজিট ফি দিন');return;}
  if(!room){alert('কক্ষ নম্বর দিন');return;}
  if(!hours){alert('ভিজিটিং সময় দিন');return;}
  if(!fSelDays.length){alert('অন্তত একটি দিন বেছে নিন');return;}
  var sortedDays=fSelDays.slice().sort(function(a,b){return a-b;});
  var dayNames=sortedDays.map(function(i){return DAYS_BN[i];});
  var col=DOC_COLORS[fSelColorIdx];
  var docObj={name:name,spec:spec,qual:qual,exp:exp,fee:fee,limit:limit,room:room,hours:hours,days:dayNames,dayIdx:sortedDays,avatar:fSelAvatar,color:col.color,bg:col.bg};
  if(editDocId){
    var idx=DOCTORS.findIndex(function(x){return x.id===editDocId;});
    if(idx>=0)DOCTORS[idx]=merge(DOCTORS[idx],docObj);
  } else {
    docObj.id=Date.now().toString(36)+Math.random().toString(36).substr(2);
    DOCTORS.push(docObj);
  }
  saveDoctors(); closeDocForm(); renderAdminContent(); renderDoctors(); initHome();
  alert(editDocId?'ডাক্তারের তথ্য আপডেট হয়েছে!':'নতুন ডাক্তার যোগ হয়েছে!');
}
function deleteDoctor(id){
  var d=DOCTORS.find(function(x){return x.id===id;});
  if(!d||!confirm('"'+d.name+'" কে মুছে ফেলবেন?'))return;
  DOCTORS=DOCTORS.filter(function(x){return x.id!==id;});
  saveDoctors(); renderAdminContent(); renderDoctors(); initHome();
}

function fbLoadDoctors(){
  db.collection('doctors').orderBy('order').get().then(function(snap){
    if(snap.empty){
      var batch=db.batch();
      DEFAULT_DOCTORS.forEach(function(d,i){batch.set(db.collection('doctors').doc(d.id),Object.assign({},d,{order:i}));});
      batch.commit().then(function(){DOCTORS=JSON.parse(JSON.stringify(DEFAULT_DOCTORS));initHome();renderDoctors();});
    }else{
      DOCTORS=[];
      snap.forEach(function(doc){DOCTORS.push(doc.data());});
      initHome();renderDoctors();
    }
  }).catch(function(e){console.error(e);});
}

function fbLoadSettings(){
  db.collection('config').doc('settings').get().then(function(doc){
    if(doc.exists){SETTINGS=merge(DEFAULT_SETTINGS,doc.data());}
    else{SETTINGS=merge({},DEFAULT_SETTINGS);db.collection('config').doc('settings').set(SETTINGS);}
    applyTheme(SETTINGS.themeColor);
    var hn=document.getElementById('h-hosp-name');if(hn)hn.textContent=SETTINGS.hospitalName;
    initHome();
  }).catch(function(e){console.error(e);});
}

saveSettingsData=function(){
  _origSaveSettings();
  if(db)db.collection('config').doc('settings').set(SETTINGS).catch(function(e){console.error(e);});
};

var _origSaveDoctors=saveDoctors;
saveDoctors=function(){
  _origSaveDoctors();
  if(!db)return;
  db.collection('doctors').get().then(function(snap){
    var batch=db.batch();
    snap.forEach(function(doc){batch.delete(doc.ref);});
    DOCTORS.forEach(function(d,i){batch.set(db.collection('doctors').doc(d.id),Object.assign({},d,{order:i}));});
    return batch.commit();
  }).catch(function(e){console.error(e);});
};

function fbListenAppts(){
  db.collection('appointments').orderBy('bookedAt','desc')
    .onSnapshot(function(snap){
      var appts=[];snap.forEach(function(doc){appts.push(doc.data());});
      localStorage.setItem('appts',JSON.stringify(appts));
      updateBadge();
      var as=document.getElementById('screen-appointments');
      if(as&&as.classList.contains('active'))renderAppointments();
      if(adminLoggedIn&&adminTab==='today')renderAdminContent();
    },function(e){console.error('Snapshot error:',e);});
}

getSerialCount=function(did,date){
  var appts=getAppts();
  return appts.filter(function(a){return a.doctorId===did&&a.date===date&&a.status!=='cancelled';}).length;
};

// Override confirmBooking for Firebase save
var _origConfirm=confirmBooking;
confirmBooking=function(){
  var name=document.getElementById('f-name').value.trim();
  var age=document.getElementById('f-age').value.trim();
  var phone=document.getElementById('f-phone').value.trim();
  var prob=document.getElementById('f-prob').value.trim();
  if(!name){alert('রোগীর নাম দিন');return;}
  if(!age){alert('বয়স দিন');return;}
  if(!phone||phone.length<11){alert('সঠিক মোবাইল নম্বর দিন (১১ সংখ্যা)');return;}
  var d=curDoc,dateObj=bookDates[selDateIdx],iso=formatISO(dateObj);
  var curCnt=getSerialCount(d.id,iso);
  if(curCnt>=d.limit){alert('এই দিনের সিরিয়াল পূর্ণ!');return;}
  var btn=document.querySelector('.book-btn');if(btn){btn.disabled=true;btn.textContent='⏳ সেভ হচ্ছে...';}
  var serial=curCnt+1;
  var aid=Date.now().toString(36)+Math.random().toString(36).substr(2);
  var appt={id:aid,doctorId:d.id,doctorName:d.name,doctorSpec:d.spec,room:d.room,
    patientName:name,patientAge:age,patientPhone:phone,problem:prob,
    date:iso,dateDisplay:formatDisplay(dateObj),time:d.hours,
    serialNumber:serial,fee:d.fee,status:'confirmed',
    bookedAt:new Date().toISOString(),avatar:d.avatar,docColor:d.color};
  function done(){
    var appts=getAppts();appts.push(appt);localStorage.setItem('appts',JSON.stringify(appts));
    curConfirm=appt;
    document.getElementById('confirm-ticket').innerHTML=
      '<div class="ticket-serial" style="background:'+d.color+'">'
      +'<div class="ticket-serial-label">সিরিয়াল নম্বর</div>'
      +'<div class="ticket-serial-num">'+serial+'</div></div>'
      +'<div class="ticket-body">'
      +'<div class="ticket-row"><span class="ticket-icon">👨‍⚕️</span><div><div class="ticket-info-label">ডাক্তার</div><div class="ticket-info-val">'+esc(d.name)+'</div><div class="ticket-info-sub">'+esc(d.spec)+'</div></div></div>'
      +'<div class="ticket-row"><span class="ticket-icon">👤</span><div><div class="ticket-info-label">রোগী</div><div class="ticket-info-val">'+esc(name)+'</div><div class="ticket-info-sub">বয়স: '+esc(age)+' | 📞 '+esc(phone)+'</div></div></div>'
      +'<div class="ticket-row"><span class="ticket-icon">📅</span><div><div class="ticket-info-label">তারিখ</div><div class="ticket-info-val">'+formatDisplay(dateObj)+'</div><div class="ticket-info-sub">'+esc(d.hours)+'</div></div></div>'
      +'<div class="ticket-row"><span class="ticket-icon">🚪</span><div><div class="ticket-info-label">চেম্বার</div><div class="ticket-info-val">'+esc(d.room)+'</div></div></div>'
      +'<div class="ticket-divider"></div>'
      +'<div class="ticket-fee-row"><span>ভিজিট ফি</span><span class="ticket-fee-val">৳'+d.fee+'</span></div>'
      +'</div>';
    updateBadge();goTo('screen-confirm');
  }
  if(db){db.collection('appointments').doc(aid).set(appt).then(done).catch(function(e){console.error(e);done();});}
  else{done();}
};

// Override cancelAppt for Firebase
var _origCancel=cancelAppt;
cancelAppt=function(id){
  if(!confirm('এই সিরিয়াল বাতিল করতে চান?'))return;
  var appts=getAppts().map(function(a){return a.id===id?merge(a,{status:'cancelled'}):a;});
  localStorage.setItem('appts',JSON.stringify(appts));
  if(db)db.collection('appointments').doc(id).update({status:'cancelled'}).catch(function(e){console.error(e);});
  renderAppointments();updateBadge();
};
</script>

  setTimeout(initFirebase, 500);
}
