<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d6b30">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="হাজিরা">
<link rel="manifest" href="#" id="manifest-placeholder">
<title>মেরিট কেয়ার স্কুল — হাজিরা</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g1:#0d6b30;--g2:#1a9944;
  --b1:#0b3d8f;--b2:#1a5fd4;
  --gold:#f5b800;--red:#c0392b;--cyan:#00acc1;
  --pur:#7b1fa2;--orange:#e65100;--teal:#00796b;
}
body{font-family:'Noto Sans Bengali',sans-serif;background:#e6f2ea;min-height:100vh;}

/* LOGIN */
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0d6b30 0%,#0b3d8f 60%,#1a1a2e 100%);padding:20px;}
.lc{background:white;border-radius:20px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.ll{text-align:center;margin-bottom:14px;}
.ll img{width:76px;height:76px;border-radius:50%;object-fit:cover;border:4px solid var(--gold);}
.lt{text-align:center;margin-bottom:18px;}
.lt h2{font-size:16px;font-weight:900;color:var(--g1);}
.lt p{font-size:11px;color:#777;margin-top:3px;}
.rtabs{display:flex;background:#f0f8f2;border-radius:10px;padding:4px;gap:4px;margin-bottom:16px;}
.rtab{flex:1;padding:9px 4px;text-align:center;border-radius:8px;font-size:12px;font-weight:700;
  color:#666;cursor:pointer;border:none;background:transparent;font-family:inherit;transition:.2s;}
.rtab.active{background:var(--g1);color:white;box-shadow:0 2px 8px rgba(13,107,48,.4);}
.lf label{display:block;font-size:12px;font-weight:700;color:#444;margin-bottom:4px;}
.lf input{width:100%;padding:11px 14px;border:2px solid #ddd;border-radius:10px;font-size:14px;
  font-family:inherit;font-weight:600;color:#333;outline:none;margin-bottom:12px;transition:.2s;}
.lf input:focus{border-color:var(--g1);background:#f0f8f2;}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--g1),var(--g2));
  color:white;border:none;border-radius:10px;font-size:15px;font-weight:900;font-family:inherit;
  cursor:pointer;box-shadow:0 4px 12px rgba(13,107,48,.4);transition:.15s;}
.btn-login:active{transform:scale(.98);}
.lerr{color:var(--red);font-size:12px;font-weight:700;text-align:center;margin-top:8px;min-height:18px;}

/* INSTALL BANNER */
#install-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:linear-gradient(135deg,var(--g1),var(--b1));
  padding:12px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.3);}
.ib-inner{display:flex;align-items:center;gap:10px;}
.ib-icon{width:40px;height:40px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.ib-text{flex:1;}
.ib-text h4{font-size:13px;font-weight:900;color:white;}
.ib-text p{font-size:10px;color:rgba(255,255,255,.8);margin-top:1px;}
.btn-install{background:var(--gold);color:#333;border:none;border-radius:8px;
  padding:8px 14px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;flex-shrink:0;}
.btn-dismiss{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;
  cursor:pointer;padding:4px;flex-shrink:0;}

/* APP */
#app{display:none;}
.topbar{background:linear-gradient(135deg,var(--g1),#0b3d8f);padding:9px 12px;
  display:flex;align-items:center;gap:9px;box-shadow:0 2px 8px rgba(0,0,0,.3);
  position:sticky;top:0;z-index:200;}
.tb-logo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0;}
.tb-info{flex:1;}
.tb-info h3{font-size:12px;font-weight:900;color:white;line-height:1.2;}
.tb-info p{font-size:9px;color:rgba(255,255,255,.7);}
.ub{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
  border-radius:20px;padding:4px 8px;color:white;font-size:10px;font-weight:700;
  display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ub .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}
.btn-out{background:rgba(255,0,0,.2);border:1.5px solid rgba(255,100,100,.5);
  color:white;border-radius:7px;padding:5px 8px;font-size:10px;font-weight:700;
  cursor:pointer;font-family:inherit;flex-shrink:0;}

.nav-tabs{display:flex;background:white;border-bottom:2px solid #e0e0e0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ntab{flex:1;min-width:60px;padding:9px 4px;text-align:center;color:#888;
  font-size:10px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;
  white-space:nowrap;user-select:none;}
.ntab.active{color:var(--g1);border-bottom:3px solid var(--g1);}
.ntab.locked{opacity:.35;cursor:not-allowed;}

.page{display:none;animation:fadeUp .3s ease;}
.page.active{display:block;}
.pg{padding:10px;}

/* DASHBOARD */
.dctrl{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
.dctrl input{flex:1;padding:8px 10px;border:2px solid var(--g1);border-radius:8px;
  font-size:12px;font-family:inherit;font-weight:600;outline:none;}
.btn-set{padding:8px 12px;background:var(--b1);color:white;border:none;border-radius:8px;
  font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-si{width:100%;padding:12px;background:linear-gradient(135deg,var(--g1),var(--g2));
  color:white;border:none;border-radius:10px;font-size:14px;font-weight:900;
  font-family:inherit;cursor:pointer;margin-bottom:6px;box-shadow:0 4px 12px rgba(13,107,48,.3);}
.btn-si:active{transform:scale(.98);}
#savemsg{text-align:center;font-size:12px;font-weight:700;color:var(--g1);min-height:16px;margin-bottom:6px;}

#card{background:#f8fff9;border:3px solid var(--g1);border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.ch{background:linear-gradient(135deg,#0d6b30,#0b3d8f);padding:9px 12px;display:flex;align-items:center;gap:10px;}
.ch-logo{width:56px;height:56px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);flex-shrink:0;}
.ch-txt{flex:1;color:white;}
.ch-txt h1{font-size:13px;font-weight:900;line-height:1.3;text-shadow:1px 1px 3px rgba(0,0,0,.5);}
.ch-txt p{font-size:9px;opacity:.85;margin-top:1px;}
.ch-txt .fnd{font-size:9px;color:var(--gold);font-weight:800;margin-top:2px;}
.datebar{background:#fffde7;text-align:center;padding:6px;font-size:14px;font-weight:900;color:#333;border-bottom:2px solid var(--gold);}
.colhd{display:grid;grid-template-columns:1fr 70px 70px 74px;background:var(--b1);color:white;font-size:10px;font-weight:700;text-align:center;}
.colhd div{padding:6px 2px;border-right:1px solid rgba(255,255,255,.2);}
.colhd div:first-child{text-align:left;padding-left:8px;}
.slbl{text-align:center;padding:5px;font-weight:800;font-size:11px;letter-spacing:.5px;}
.sl1{background:#e3f2fd;color:#0d47a1;border-top:2px solid #90caf9;}
.sl2{background:#fff8e1;color:var(--orange);border-top:2px solid #ffcc80;}
.rowit{display:grid;grid-template-columns:1fr 70px 70px 74px;border-top:1px solid #ddd;align-items:center;}
.rowit:nth-child(even){background:#f0f9f2;}.rowit:nth-child(odd){background:white;}
.rn{padding:6px 8px;font-size:12px;font-weight:700;color:var(--b1);}
.rtc{text-align:center;font-weight:700;font-size:12px;color:#333;padding:3px 2px;}
.rinp{display:flex;justify-content:center;padding:2px;}
.rinp input{width:58px;text-align:center;border:2px solid var(--g2);border-radius:5px;padding:4px 2px;
  font-size:12px;font-weight:800;color:var(--g1);background:#f0f9f2;outline:none;font-family:inherit;}
.rinp input:focus{border-color:var(--b1);}
.rinp input:read-only{background:#f5f5f5;color:#aaa;border-color:#ccc;cursor:not-allowed;}
.ac{text-align:center;font-weight:900;font-size:13px;padding:3px 2px;}
.a0{background:#ef5350;color:white;}.al{background:#ff8f00;color:white;}
.am{background:#e53935;color:white;}.ah{background:#b71c1c;color:white;}
.subrow{display:grid;grid-template-columns:1fr 70px 70px 74px;border-top:2px solid #26a69a;background:#e0f2f1;}
.subrow .slb{padding:6px 8px;font-size:10px;font-weight:800;color:#004d40;background:#b2dfdb;}
.subrow .svl{text-align:center;font-weight:800;font-size:14px;color:var(--b1);background:#80cbc4;padding:5px 2px;}
.subrow .sab{text-align:center;font-weight:900;font-size:15px;color:white;background:var(--red);padding:5px 2px;}
.summary{border-top:3px solid var(--g1);}
.sumrow{display:grid;grid-template-columns:1fr 100px;border-top:2px solid #ddd;}
.sumrow:first-child{border-top:none;}
.sumlbl{padding:10px 12px;font-size:17px;font-weight:800;color:var(--b1);background:white;}
.sumval{display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;}
.svt{background:var(--cyan);color:white;}.svp{background:#43a047;color:white;}.sva{background:var(--pur);color:white;}
.cfoot{background:linear-gradient(90deg,var(--g1),var(--b1));color:rgba(255,255,255,.7);
  text-align:center;padding:4px;font-size:9px;}
.cfoot a{color:var(--gold);text-decoration:none;font-weight:800;}

/* STUDENTS */
.ststats{display:flex;gap:6px;margin-bottom:10px;}
.stbox{flex:1;background:white;border-radius:8px;padding:9px 5px;text-align:center;border:2px solid #e0e0e0;}
.stbox .sn{font-size:22px;font-weight:900;}
.stbox .sl{font-size:9px;color:#777;font-weight:700;}
.stbox.t{border-color:var(--cyan);}.stbox.t .sn{color:var(--cyan);}
.stbox.p{border-color:#43a047;}.stbox.p .sn{color:#43a047;}
.stbox.a{border-color:var(--red);}.stbox.a .sn{color:var(--red);}
.filtrow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.fbtn{padding:5px 10px;border:2px solid var(--g1);border-radius:20px;background:white;
  font-size:10px;font-weight:700;cursor:pointer;color:var(--g1);font-family:inherit;}
.fbtn.active{background:var(--g1);color:white;}
.sbox input{width:100%;padding:9px 12px;border:2px solid var(--g1);border-radius:8px;
  font-size:12px;font-family:inherit;font-weight:600;outline:none;margin-bottom:8px;}
.addform{background:white;border-radius:10px;border:2px solid var(--g1);padding:12px;margin-bottom:10px;}
.addform h4{font-size:13px;font-weight:800;color:var(--g1);margin-bottom:9px;}
.irow{display:flex;gap:5px;margin-bottom:7px;}
.irow input,.irow select{flex:1;padding:8px 8px;border:2px solid #ddd;border-radius:7px;
  font-size:11px;font-family:inherit;font-weight:600;outline:none;min-width:0;}
.irow input:focus,.irow select:focus{border-color:var(--g1);}
.btn-addst{width:100%;padding:10px;background:var(--g2);color:white;border:none;
  border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
.stcard{background:white;border-radius:8px;border:1.5px solid #e0e0e0;margin-bottom:7px;padding:9px;}
.stcard-top{display:flex;align-items:center;gap:8px;}
.stav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:white;flex-shrink:0;}
.av-g{background:var(--g1);}.av-b{background:var(--b1);}.av-o{background:var(--orange);}.av-p{background:var(--pur);}
.stmeta{flex:1;}
.stmeta .stnm{font-size:13px;font-weight:800;color:#222;}
.stmeta .stinfo{font-size:9px;color:#777;margin-top:1px;}
.atbtns{display:flex;gap:4px;flex-shrink:0;}
.btnp{padding:6px 8px;background:#e8f5e9;border:2px solid #43a047;color:#1b5e20;
  border-radius:7px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;}
.btnp.active{background:#43a047;color:white;}
.btna{padding:6px 8px;background:#fde8e8;border:2px solid var(--red);color:#b71c1c;
  border-radius:7px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;}
.btna.active{background:var(--red);color:white;}
.stcard-acts{display:flex;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;}
.bsm{flex:1;padding:7px 5px;border-radius:7px;font-size:10px;font-weight:800;
  cursor:pointer;font-family:inherit;border:2px solid;text-align:center;}
.bsm-ed{background:#fff8e1;border-color:var(--gold);color:#795500;}
.bsm-dl{background:#fde8e8;border-color:var(--red);color:var(--red);}
.bsm-hi{background:#e8eaf6;border-color:var(--b1);color:var(--b1);}

/* NOTICE */
.notice-wrap{background:#fff8e1;border:2px solid var(--gold);border-radius:10px;padding:10px;margin-bottom:10px;}
.notice-wrap h4{font-size:12px;font-weight:800;color:var(--orange);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.n-item{padding:8px;border-bottom:1px solid #ffe082;position:relative;}
.n-item:last-child{border-bottom:none;}
.n-item .nt{font-size:12px;font-weight:800;color:#333;padding-right:20px;}
.n-item .nb{font-size:11px;color:#555;margin-top:2px;line-height:1.5;}
.n-item .nd{font-size:9px;color:#999;margin-top:3px;font-weight:600;}
.n-del{position:absolute;top:6px;right:4px;background:none;border:none;
  color:var(--red);font-size:14px;cursor:pointer;font-weight:900;}
.no-notice{text-align:center;color:#999;font-size:11px;padding:10px;font-weight:600;}

/* MONTHLY */
.mc{background:white;border-radius:10px;border:2px solid var(--g1);padding:12px;margin-bottom:10px;}
.mc h4{font-size:13px;font-weight:800;color:var(--g1);margin-bottom:10px;}
.mrow{display:flex;gap:6px;margin-bottom:8px;}
.mrow input,.mrow select{flex:1;padding:9px 10px;border:2px solid #ddd;border-radius:8px;
  font-size:12px;font-family:inherit;font-weight:600;outline:none;min-width:0;}
.mrow input:focus,.mrow select:focus{border-color:var(--g1);}
.btn-mday{width:100%;padding:11px;background:var(--teal);color:white;border:none;
  border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:6px;}
.btn-pdf{width:100%;padding:11px;background:linear-gradient(135deg,var(--b1),var(--b2));
  color:white;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
.ind-search{background:white;border-radius:10px;border:2px solid var(--g1);padding:12px;margin-bottom:10px;}
.ind-search h4{font-size:13px;font-weight:800;color:var(--g1);margin-bottom:10px;}
.ind-row{display:flex;gap:6px;margin-bottom:8px;}
.ind-row input,.ind-row select{flex:1;padding:9px 10px;border:2px solid #ddd;border-radius:8px;
  font-size:12px;font-family:inherit;font-weight:600;outline:none;}
.ind-row input:focus{border-color:var(--g1);}
.btn-isrch{padding:9px 14px;background:var(--g1);color:white;border:none;border-radius:8px;
  font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;}
.ind-res{background:#f0f8f2;border-radius:8px;padding:12px;border:2px solid #c8e6c9;margin-top:8px;}
.ind-stats{display:flex;gap:6px;margin:8px 0;}
.is{flex:1;text-align:center;padding:8px 4px;border-radius:7px;}
.is-p{background:#c8e6c9;color:#1b5e20;}.is-a{background:#ffcdd2;color:#b71c1c;}.is-r{background:#bbdefb;color:var(--b1);}
.is .isn{font-size:18px;font-weight:900;}.is .isl{font-size:9px;font-weight:700;}
.day-grid{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px;}
.dc{min-width:26px;padding:3px 2px;border-radius:4px;font-size:9px;text-align:center;border:1px solid #e0e0e0;}
.dc-p{background:#c8e6c9;border-color:#a5d6a7;color:#1b5e20;}.dc-a{background:#ffcdd2;border-color:#ef9a9a;color:#b71c1c;}
.btn-gen-pdf{width:100%;padding:10px;background:linear-gradient(135deg,var(--red),#e53935);
  color:white;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}

/* SUPER ADMIN */
.sec-title{display:flex;align-items:center;gap:7px;padding:9px 12px;background:var(--g1);
  color:white;border-radius:8px;margin-bottom:10px;font-size:13px;font-weight:800;}
.cblock{background:white;border-radius:10px;border:2px solid #e0e0e0;margin-bottom:10px;overflow:hidden;}
.cbhead{background:#f5f5f5;padding:8px 12px;font-size:12px;font-weight:800;color:#333;
  border-bottom:2px solid #e0e0e0;display:flex;align-items:center;gap:6px;}
.cbbody{padding:12px;}
.fgrp{margin-bottom:9px;}
.fgrp label{display:block;font-size:11px;font-weight:700;color:#444;margin-bottom:3px;}
.fgrp input,.fgrp select{width:100%;padding:9px 10px;border:2px solid #ddd;border-radius:8px;
  font-size:12px;font-family:inherit;font-weight:600;outline:none;}
.fgrp input:focus,.fgrp select:focus{border-color:var(--g1);}
.btn-addtch{width:100%;padding:10px;background:var(--g1);color:white;border:none;
  border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
.urrow{display:flex;align-items:center;gap:8px;padding:9px;border:1.5px solid #e0e0e0;
  border-radius:8px;margin-bottom:7px;background:#fafafa;}
.urav{width:34px;height:34px;border-radius:50%;background:var(--g1);display:flex;align-items:center;
  justify-content:center;color:white;font-size:14px;flex-shrink:0;}
.urinfo{flex:1;}
.urinfo .urnm{font-size:12px;font-weight:800;color:#222;}
.urinfo .urrole{font-size:10px;color:#666;margin-top:1px;}
.urinfo .urperms{font-size:9px;color:var(--g1);font-weight:700;margin-top:1px;}
.btn-ep{background:var(--b1);color:white;border:none;border-radius:6px;padding:5px 9px;
  font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-du{background:var(--red);color:white;border:none;border-radius:6px;padding:5px 7px;
  font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;}
/* NOTICE ADMIN */
.na-inp{width:100%;padding:9px 10px;border:2px solid #ddd;border-radius:8px;font-size:12px;
  font-family:inherit;font-weight:600;outline:none;margin-bottom:8px;}
.na-inp:focus{border-color:var(--orange);}
.btn-notice{width:100%;padding:11px;background:linear-gradient(135deg,var(--orange),#ff8f00);
  color:white;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
.na-item{background:#fff8e1;border-left:4px solid var(--gold);border-radius:0 8px 8px 0;
  padding:10px 12px;margin-bottom:7px;position:relative;}
.na-item .nat{font-size:12px;font-weight:800;color:#333;padding-right:24px;}
.na-item .nab{font-size:11px;color:#555;margin-top:3px;line-height:1.5;}
.na-item .nad{font-size:9px;color:#999;margin-top:3px;font-weight:600;}
.na-del{position:absolute;top:8px;right:8px;background:rgba(192,57,43,.1);
  border:1.5px solid var(--red);color:var(--red);border-radius:5px;padding:3px 7px;
  font-size:11px;cursor:pointer;font-weight:800;font-family:inherit;}

/* MODAL */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);
  z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeUp .2s ease;}
.mbox{background:white;border-radius:14px;padding:18px;width:100%;max-width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);max-height:90vh;overflow-y:auto;}
.mbox h3{font-size:14px;font-weight:900;color:var(--g1);margin-bottom:12px;}
.mclose{float:right;background:none;border:none;font-size:18px;color:#999;cursor:pointer;margin-top:-3px;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px;}
.pitem{display:flex;align-items:center;justify-content:space-between;
  background:#f0f8f2;border-radius:7px;padding:7px 9px;border:1.5px solid #c8e6c9;}
.pitem label{font-size:10px;font-weight:700;color:#333;flex:1;}
.tgl{position:relative;width:34px;height:19px;cursor:pointer;flex-shrink:0;}
.tgl input{opacity:0;width:0;height:0;position:absolute;}
.tgl-s{position:absolute;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:19px;transition:.3s;}
.tgl-s:before{content:'';position:absolute;width:15px;height:15px;left:2px;bottom:2px;
  background:white;border-radius:50%;transition:.3s;}
.tgl input:checked + .tgl-s{background:var(--g1);}
.tgl input:checked + .tgl-s:before{transform:translateX(15px);}
.btn-saveperm{width:100%;padding:10px;background:var(--g1);color:white;border:none;
  border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px;}
.ebtn{width:100%;padding:10px;background:var(--b1);color:white;border:none;
  border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;}
.fgrp-s{margin-bottom:9px;}
.fgrp-s label{display:block;font-size:11px;font-weight:700;color:#444;margin-bottom:3px;}
.fgrp-s input,.fgrp-s select{width:100%;padding:9px 10px;border:2px solid #ddd;border-radius:8px;
  font-size:12px;font-family:inherit;font-weight:600;outline:none;}

/* PDF */
#pdf-area{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:white;z-index:9999;overflow-y:auto;padding:20px;}
.pdf-btns{display:flex;gap:8px;margin-bottom:14px;}
.pdf-btns button{flex:1;padding:10px;font-size:13px;font-weight:800;border:none;
  border-radius:8px;cursor:pointer;font-family:inherit;}
.btn-print{background:var(--b1);color:white;}
.btn-close-pdf{background:#666;color:white;}
.pdf-head{text-align:center;margin-bottom:14px;border-bottom:2px solid var(--g1);padding-bottom:10px;}
.pdf-head img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);}
.pdf-head h2{font-size:15px;font-weight:900;color:var(--g1);margin-top:6px;}
.pdf-head p{font-size:10px;color:#555;}
.pdf-table{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:12px;}
.pdf-table th{background:var(--b1);color:white;padding:6px 4px;text-align:center;border:1px solid #ccc;}
.pdf-table td{padding:5px;border:1px solid #ddd;text-align:center;font-weight:600;}
.pdf-table tr:nth-child(even) td{background:#f0f8f2;}
.pdf-table td:first-child{text-align:left;padding-left:8px;font-weight:800;color:var(--b1);}
.pdf-dp{color:#1b5e20;font-weight:800;}.pdf-da{color:var(--red);font-weight:800;}
.pdf-footer{text-align:center;font-size:9px;color:#888;margin-top:8px;border-top:1px solid #eee;padding-top:6px;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(13,107,48,.95);color:white;padding:10px 18px;border-radius:30px;
  font-size:12px;font-weight:700;z-index:999;animation:fadeUp .3s ease;
  box-shadow:0 4px 12px rgba(0,0,0,.3);white-space:nowrap;}

@media print{#pdf-area{position:static;}.pdf-btns{display:none !important;}}
</style>
</head>
